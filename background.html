<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            /* 昼夜基础底色 */
            --bg-day: #2C3038;
            --bg-night: #050408;
            --transition-speed: 3s; /* 增加到3秒，模拟液态流动的缓慢感 */
        }

        body, html { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: var(--bg-night); 
            transition: background var(--transition-speed); 
        }
        
        body.day-mode { background: var(--bg-day); }

        /* 🌟 核心：4切片流体引擎 (iPad 级增强版) */
        .fluid-container {
            position: absolute; 
            inset: -35%; /* 扩大范围以支撑剧烈旋转位移 */
            width: 170%; height: 170%;
            /* 关键：对比度1.2 + 饱和度1.8 + 亮度0.85，补齐那2成质感 */
            filter: blur(110px) contrast(1.2) saturate(1.8) brightness(0.85);
            transform: scale(1.05);
            z-index: 1;
            will-change: transform;
        }

        .slice {
            position: absolute; inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.65;
            mix-blend-mode: screen; /* 产生多层光影叠加感 */
            /* 使用贝塞尔曲线模拟液体粘滞的过渡 */
            transition: background-image var(--transition-speed) cubic-bezier(0.45, 0, 0.55, 1);
        }

        /* 模拟 Apple Music 的异步区域旋转逻辑 */
        .slice:nth-child(1) { 
            clip-path: inset(0 50% 50% 0); 
            animation: rotate1 30s infinite ease-in-out; 
            transform-origin: 35% 35%; 
        }
        .slice:nth-child(2) { 
            clip-path: inset(0 0 50% 50%); 
            animation: rotate2 35s infinite ease-in-out; 
            transform-origin: 65% 35%; 
        }
        .slice:nth-child(3) { 
            clip-path: inset(50% 50% 0 0); 
            animation: rotate3 40s infinite ease-in-out; 
            transform-origin: 35% 65%; 
        }
        .slice:nth-child(4) { 
            clip-path: inset(50% 0 0 50%); 
            animation: rotate4 32s infinite ease-in-out; 
            transform-origin: 65% 65%; 
        }

        /* 异步动画：加入微小的缩放位移，让色块更有“肉感” */
        @keyframes rotate1 { from { transform: rotate(0deg) scale(1.2); } 50% { transform: rotate(180deg) scale(1.4); } to { transform: rotate(360deg) scale(1.2); } }
        @keyframes rotate2 { from { transform: rotate(360deg) scale(1.3); } 50% { transform: rotate(180deg) scale(1.1); } to { transform: rotate(0deg) scale(1.3); } }
        @keyframes rotate3 { from { transform: rotate(0deg) scale(1.4); } 50% { transform: rotate(-180deg) scale(1.2); } to { transform: rotate(-360deg) scale(1.4); } }
        @keyframes rotate4 { from { transform: rotate(360deg) scale(1.1); } 50% { transform: rotate(180deg) scale(1.3); } to { transform: rotate(0deg) scale(1.1); } }

        /* 胶片颗粒质感 */
        .grain {
            position: absolute; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.22; 
            mix-blend-mode: overlay; 
            z-index: 2; 
            pointer-events: none;
        }

        /* 边缘暗化遮罩，增强深邃感 */
        .vignette {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 10%, rgba(0,0,0,0.45) 100%);
            z-index: 3; 
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="fluid-container" id="engine">
        <div class="slice"></div>
        <div class="slice"></div>
        <div class="slice"></div>
        <div class="slice"></div>
    </div>
    <div class="vignette"></div>
    <div class="grain"></div>

    <script>
        const BASE_URL = 'http://localhost:9863';
        let currentCover = "";

        // 昼夜系统检测
        function updateTheme() {
            const hour = new Date().getHours();
            const isDay = (hour >= 6 && hour < 18); //
            if (isDay) document.body.classList.add('day-mode');
            else document.body.classList.remove('day-mode');
        }

        async function update() {
            try {
                const response = await fetch(`${BASE_URL}/api/query`);
                const q = await response.json();
                // 自动对齐 track 对象
                const track = q.track || q;
                const cover = track.cover || track.picUrl || "";
                
                if (cover && cover !== currentCover) {
                    currentCover = cover;
                    const slices = document.querySelectorAll('.slice');
                    slices.forEach(s => {
                        s.style.backgroundImage = `url('${cover}')`;
                    });
                }
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        // 首次运行与定时轮询
        setInterval(update, 2000);
        setInterval(updateTheme, 60000);
        update();
        updateTheme();
    </script>
</body>
</html>
