<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-image: none; 
            --theme-bar-start: #ff4e50;         
            --theme-bar-end: #f9d423;           
            --theme-text-main: #ffffff;
            --theme-text-sub: rgba(255, 255, 255, 0.5); 
            --r-corner: 8cqh; 
            --safe-gap: 10cqh;
            --apple-spring: cubic-bezier(0.25, 1, 0.2, 1);
            --noise-texture: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4'/%3E%3C/svg%3E");
        }

        html, body {
            width: 100vw; height: 100vh; margin: 0; padding: 0;
            background-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* 🌟 整体 UI 增加淡入淡出动画，支持待机隐藏 */
        #player-ui {
            aspect-ratio: 3.8 / 1; 
            width: 100%; height: 100%;
            max-width: calc(100vh * 3.8);
            max-height: calc(100vw / 3.8);
            container-type: size; 
            display: flex;
            align-items: stretch;
            gap: var(--safe-gap); 
            padding: var(--safe-gap);
            box-sizing: border-box;
            transition: opacity 1.5s var(--apple-spring), transform 1.5s var(--apple-spring);
        }

        .is-standby { opacity: 0; transform: translateY(20px); pointer-events: none; }
        
        .cover-container {
            position: relative; height: 100%; aspect-ratio: 1 / 1; 
            flex-shrink: 0; border-radius: var(--r-corner);
        }
        
        .cover-img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 2;
            border-radius: var(--r-corner); 
            box-shadow: 0 4cqh 12cqh rgba(0,0,0,0.5);
            transition: transform 0.8s var(--apple-spring);
        }

        .cover-glow {
            position: absolute; top: 2%; left: 0%; width: 100%; height: 100%;
            background-color: var(--theme-bar-start);
            filter: blur(6cqh); z-index: 1; opacity: 0.95;
            transition: background-color 0.8s ease;
        }

        .info-panel {
            position: relative; padding: var(--safe-gap);
            display: flex; flex-direction: column; justify-content: space-between;
            flex-grow: 1; min-width: 0; height: 100%; overflow: hidden;
            box-sizing: border-box; border-radius: var(--r-corner);
            box-shadow: 0 4cqh 12cqh rgba(0,0,0,0.4);
        }

        .info-panel::before {
            content: ''; position: absolute; inset: -20%; 
            background-image: var(--bg-image); background-size: cover; background-position: center;
            filter: blur(12cqh); opacity: 0.5; z-index: 0;
            transition: background-image 0.8s ease;
        }

        .info-panel::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(15,15,20,0.4) 0%, rgba(10,10,15,0.7) 100%), var(--noise-texture);
            background-blend-mode: overlay; opacity: 0.35; z-index: 1;
        }

        .text-group, .progress-group { position: relative; z-index: 2; width: 100%; }
        .text-group { display: flex; flex-direction: column; gap: 1.5cqh; align-items: flex-start; }

        .marquee-wrapper {
            width: 100%; overflow: hidden; white-space: nowrap; text-align: left;
            -webkit-mask-image: linear-gradient(to right, #000 85%, transparent 100%);
            mask-image: linear-gradient(to right, #000 85%, transparent 100%);
            padding-bottom: 1.5cqh; 
        }
        
        .title, .artist { display: inline-block; white-space: nowrap; transition: color 0.8s ease; padding-right: 5cqh; transform-origin: left center; }
        .title { font-size: 20cqh; font-weight: 800; color: var(--theme-text-main); letter-spacing: -0.03em; word-break: break-all; }
        .artist { font-size: 9cqh; color: var(--theme-text-sub); font-weight: 500; text-transform: uppercase; letter-spacing: 0.15em; }

        .scroll-anim { animation: pingpong 10s ease-in-out infinite alternate; }
        @keyframes pingpong { 0%, 20% { transform: translateX(0); } 80%, 100% { transform: translateX(var(--scroll-dist)); } }

        .progress-group { display: flex; flex-direction: column; gap: 2cqh; width: 100%; }
        .time-row { display: flex; justify-content: space-between; align-items: center; font-size: 8.5cqh; font-weight: 600; color: var(--theme-text-sub); font-variant-numeric: tabular-nums; }
        .progress-track { width: 100%; height: 2.5cqh; background-color: rgba(255, 255, 255, 0.15); border-radius: 9999px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--theme-bar-start), var(--theme-bar-end)); width: 0%; border-radius: 9999px; transition: width 0.3s linear, background 0.8s ease; }
    </style>
</head>
<body>
    <div class="player-wrapper is-standby" id="player-ui">
        <div class="cover-container">
            <div class="cover-glow"></div>
            <img id="cover" class="cover-img" src="" crossorigin="anonymous">
            <video id="cover-video" class="cover-video" autoplay loop muted playsinline style="display: none; position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 3; border-radius: var(--r-corner);"></video>
        </div>
        
        <div class="info-panel">
            <div class="text-group">
                <div class="marquee-wrapper" id="title-wrap"><div class="title" id="title">-</div></div>
                <div class="marquee-wrapper" id="artist-wrap"><div class="artist" id="artist">-</div></div>
            </div>
            
            <div class="progress-group">
                <div class="time-row">
                    <span id="time-current">00:00</span>
                    <span id="time-total">00:00</span>
                </div>
                <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:9863';
        let currentTrackKey = "", lastTrackSwitchTime = 0, hlsInstance = null;

        const formatTime = (ms) => {
            let s = Math.floor(ms / 1000);
            return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
        };

        // 🌟 同步：HDR 色彩增强算法
        function analyzeColor(imgEl) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 50; canvas.height = 50;
            try {
                ctx.drawImage(imgEl, 0, 0, 50, 50);
                const data = ctx.getImageData(0, 0, 50, 50).data;
                let r=0, g=0, b=0, count=0;
                for (let i=0; i<data.length; i+=16) {
                    if (data[i]+data[i+1]+data[i+2] > 40) {
                        r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++;
                    }
                }
                if (count === 0) [r,g,b] = [100,100,100];
                else [r,g,b] = [r/count, g/count, b/count].map(Math.floor);

                // 亮度补偿因子
                const boost = 1.4;
                const root = document.documentElement;
                root.style.setProperty('--theme-bar-start', `rgb(${r}, ${g}, ${b})`);
                root.style.setProperty('--theme-bar-end', `rgb(${Math.min(255,r*boost)}, ${Math.min(255,g*boost)}, ${Math.min(255,b*boost)})`);
                root.style.setProperty('--theme-text-main', `rgb(${Math.min(255,r+130)}, ${Math.min(255,g+130)}, ${Math.min(255,b+130)})`);
                root.style.setProperty('--theme-text-sub', `rgba(${Math.min(255,r+130)}, ${Math.min(255,g+130)}, ${Math.min(255,b+130)}, 0.6)`);
            } catch (e) {}
        }

        document.getElementById('cover').addEventListener('load', function() { analyzeColor(this); });

        function checkAndApplyMarquee(id) {
            const el = document.getElementById(id), wrap = document.getElementById(id + '-wrap');
            el.classList.remove('scroll-anim');
            void el.offsetWidth;
            if (el.scrollWidth > wrap.clientWidth) {
                el.style.setProperty('--scroll-dist', `-${el.scrollWidth - wrap.clientWidth}px`);
                el.classList.add('scroll-anim');
            }
        }

        async function update() {
            try {
                const q = await (await fetch(`${BASE_URL}/api/query`)).json();
                const player = q.player || q;
                const track = q.track || q;
                const ui = document.getElementById('player-ui');

                // 🌟 同步：Standby 待机逻辑
                if (!player.hasSong || player.isPaused) { ui.classList.add('is-standby'); } 
                else { ui.classList.remove('is-standby'); }

                const trackKey = (track.title || '') + (track.author || '');
                if (trackKey !== currentTrackKey) {
                    currentTrackKey = trackKey;
                    lastTrackSwitchTime = Date.now();
                    document.getElementById('title').innerText = track.title || '-';
                    document.getElementById('artist').innerText = track.author || '-';
                    
                    setTimeout(() => { checkAndApplyMarquee('title'); checkAndApplyMarquee('artist'); }, 100);
                    
                    const coverUrl = track.cover || track.picUrl || '';
                    document.getElementById('cover').src = coverUrl;
                    document.documentElement.style.setProperty('--bg-image', `url('${coverUrl}')`);

                    // 视频封面处理
                    const vidEl = document.getElementById('cover-video');
                    vidEl.style.display = 'none';
                    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                    
                    fetch(`${BASE_URL}/api/cover/videoUrl`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ songTitle: track.title, songAuthor: track.author })
                    }).then(res => res.text()).then(url => {
                        if (url && url.startsWith('http')) {
                            vidEl.style.display = 'block';
                            if (url.includes('.m3u8') && Hls.isSupported()) {
                                hlsInstance = new Hls(); hlsInstance.loadSource(url); hlsInstance.attachMedia(vidEl);
                                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => vidEl.play().catch(e=>{}));
                            } else { vidEl.src = url; vidEl.play().catch(e=>{}); }
                        }
                    }).catch(e=>{});
                }

                // 🌟 同步：50ms 级别丝滑进度轴与防延迟锁
                const progData = await (await fetch(`${BASE_URL}/api/query/progress`)).json();
                let currMs = progData.progress !== undefined ? progData.progress : progData;
                if (Date.now() - lastTrackSwitchTime < 2000 && currMs > 5000) currMs = 0;

                const durationMs = (track.duration || 0) < 100000 ? (track.duration * 1000) : track.duration;
                document.getElementById('time-current').innerText = formatTime(currMs);
                document.getElementById('time-total').innerText = formatTime(durationMs);
                document.getElementById('progress-bar').style.width = `${(currMs/Math.max(durationMs, 1))*100}%`;

            } catch (e) {}
        }
        
        setInterval(update, 50); // 🌟 同步：50ms 刷新率
    </script>
</body>
</html>
