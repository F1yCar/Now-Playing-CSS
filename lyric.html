<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --theme-text-main: #ffffff;
            --theme-text-sub: rgba(255, 255, 255, 0.4);
            /* Apple 标准弹簧：更柔和的阻尼感 */
            --apple-spring: cubic-bezier(0.25, 1, 0.2, 1);
        }

        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 外部舞台：固定显示高度，剪裁溢出 */
        .stage {
            width: 90%;
            height: 80vh;
            mask-image: linear-gradient(to bottom, transparent 0%, #000 20%, #000 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 20%, #000 80%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 歌词长传送带 */
        #lyric-track {
            position: absolute;
            width: 100%;
            transition: transform 0.8s var(--apple-spring);
            will-change: transform;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 初始位置居中 */
            top: 50%;
        }

        .lyric-line {
            padding: 2.5vh 0;
            width: 100%;
            text-align: center;
            transition: all 0.8s var(--apple-spring);
            transform-origin: center center;
            word-break: break-word;
            line-height: 1.3;
        }

        /* 默认状态：非活跃行 */
        .lyric-line.idle {
            font-size: 4vh;
            font-weight: 700;
            color: var(--theme-text-sub);
            opacity: 0.35;
            filter: blur(2px);
            transform: scale(0.85);
        }

        /* 高亮状态：当前活跃行 */
        .lyric-line.active {
            font-size: 7vh;
            font-weight: 900;
            color: var(--theme-text-main);
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
            text-shadow: 0 0 2vh rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="stage">
        <div id="lyric-track">
            <div class="lyric-line active">载入中...</div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:9863';
        let lyricList = [];
        let currentTrackKey = "";
        let currentIndex = -1;

        function parseLRC(raw) {
            lyricList = [];
            if (!raw) return;
            const lines = raw.split('\n');
            const timeReg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            lines.forEach(l => {
                const m = timeReg.exec(l);
                if (m) {
                    const timeMs = parseInt(m[1])*60000 + parseInt(m[2])*1000 + (m[3].length===2 ? parseInt(m[3])*10 : parseInt(m[3]));
                    const txt = l.replace(timeReg, '').trim();
                    if (txt && txt !== "//" && !txt.startsWith('<?xml')) lyricList.push({ timeMs, text: txt });
                }
            });
            lyricList.sort((a, b) => a.timeMs - b.timeMs);
            buildTrack();
        }

        function buildTrack() {
            const track = document.getElementById('lyric-track');
            track.innerHTML = '';
            lyricList.forEach((item, index) => {
                const line = document.createElement('div');
                line.className = 'lyric-line idle';
                line.innerText = item.text;
                line.id = `line-${index}`;
                track.appendChild(line);
            });
        }

        function syncTheme(imgUrl) {
            if (!imgUrl) return;
            const img = new Image(); img.crossOrigin="anonymous"; img.src=imgUrl;
            img.onload = () => {
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                canvas.width=10; canvas.height=10; ctx.drawImage(img,0,0,10,10);
                const [r,g,b] = ctx.getImageData(5,5,1,1).data;
                const mR = Math.min(255, r+130); const mG = Math.min(255, g+130); const mB = Math.min(255, b+130);
                document.documentElement.style.setProperty('--theme-text-main', `rgb(${mR},${mG},${mB})`);
                document.documentElement.style.setProperty('--theme-text-sub', `rgba(${mR},${mG},${mB},0.4)`);
            }
        }

        async function update() {
            try {
                const q = await (await fetch(`${BASE_URL}/api/query`)).json();
                const track = q.track || q;
                const trackKey = (track.title || '') + (track.author || '');

                if (trackKey !== currentTrackKey) {
                    currentTrackKey = trackKey;
                    currentIndex = -1;
                    syncTheme(track.cover || track.picUrl || '');
                    const lrcRes = await (await fetch(`${BASE_URL}/api/lyric`)).json();
                    parseLRC(lrcRes.lrc || lrcRes.lyric || lrcRes.data || "");
                }

                if (lyricList.length === 0) return;

                const prog = await (await fetch(`${BASE_URL}/api/query/progress`)).json();
                const currentMs = prog.progress !== undefined ? prog.progress : prog;

                let newIndex = -1;
                for (let i = lyricList.length - 1; i >= 0; i--) {
                    if (currentMs >= lyricList[i].timeMs) { newIndex = i; break; }
                }

                if (newIndex !== currentIndex && newIndex !== -1) {
                    scrollToLine(newIndex);
                }
            } catch (e) {}
        }

        function scrollToLine(index) {
            const track = document.getElementById('lyric-track');
            const lines = document.getElementsByClassName('lyric-line');
            
            // 1. 清除旧的高亮
            if (currentIndex !== -1 && lines[currentIndex]) {
                lines[currentIndex].className = 'lyric-line idle';
            }
            
            // 2. 更新新高亮
            currentIndex = index;
            const targetLine = lines[index];
            targetLine.className = 'lyric-line active';

            // 3. 计算位移：让当前行永远位于容器的中心位置
            // 我们通过减去目标行相对于 track 顶部的距离来实现
            const offset = targetLine.offsetTop + (targetLine.offsetHeight / 2);
            track.style.transform = `translateY(-${offset}px)`;
        }

        setInterval(update, 100);
    </script>
</body>
</html>
