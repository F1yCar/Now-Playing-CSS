<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            /* 锁死纯白主题 */
            --theme-text-main: #ffffff;
            --theme-text-sub: rgba(255, 255, 255, 0.45);
            --r-corner: 1vh; 
            --apple-spring: cubic-bezier(0.25, 1, 0.2, 1);
        }

        html, body {
            width: 100vw; height: 100vh; margin: 0; padding: 0;
            background-color: transparent; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }

        .stage-wrapper {
            position: absolute; inset: 0; z-index: 3;
            display: flex; align-items: center; 
            padding-left: 15vw; padding-right: 8vw;
            transition: opacity 1.5s var(--apple-spring);
        }

        .main-stage {
            width: 100%; display: flex; align-items: center; gap: 8vw;
        }

        .left-panel { flex: 0 0 auto; width: min(40vh, 30vw); display: flex; flex-direction: column; }
        .cover-box { 
            width: 100%; aspect-ratio: 1/1; border-radius: var(--r-corner); 
            box-shadow: 0 2vh 6vh rgba(0,0,0,0.7); 
            margin-bottom: 3vh; background: rgba(0,0,0,0.2); 
        }
        .cover-img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--r-corner); transition: opacity 0.5s; }
        
        /* 1. 歌名：作为核心，拉高不透明度，使其最“实” */
        .title { 
            font-size: 4.2vh; font-weight: 800; 
            /* 🌟 核心修正：提升至 0.95，保证绝对的视觉统治力 */
            color: rgba(255, 255, 255, 0.95); 
            margin-bottom: 0.5vh; line-height: 1.3; letter-spacing: -0.02em; 
            display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9); 
        }

        /* 2. 歌手：作为附属，大幅降低不透明度，使其更“透” */
        .artist { 
            font-size: 2vh; font-weight: 600; 
            /* 🌟 核心修正：降低至 0.55，呈现出一种精致的半透明磨砂感 */
            color: rgba(255, 255, 255, 0.55); 
            margin-bottom: 3vh; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.8); 
        }

        /* 3. 进度条时间：对齐歌名的扎实感，保证功能性 */
        .time-row { 
            display: flex; justify-content: space-between; font-size: 1.5vh; font-weight: 700; 
            color: rgba(255, 255, 255, 0.85); 
            margin-bottom: 1vh; font-variant-numeric: tabular-nums; 
            text-shadow: 0 1px 5px rgba(0,0,0,0.9); 
        }
        
        .track-bar { 
            height: 4px; 
            background: rgba(255, 255, 255, 0.15); /* 👈 增加底色亮度 */
            border-radius: 2px; 
            overflow: hidden; 
            box-shadow: 0 1px 4px rgba(0,0,0,0.5); 
        }
        .fill-bar { 
            height: 100%; width: 0%; background: var(--theme-text-main); 
            transition: width 0.3s linear; 
            box-shadow: 0 0 4px rgba(0,0,0,0.5); 
        }

        .right-panel {
            flex: 1; height: 85vh; position: relative;
            mask-image: linear-gradient(to bottom, transparent 0%, #000 20%, #000 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 20%, #000 80%, transparent 100%);
        }

        #lyric-track {
            position: absolute; width: 90%; top: 45%; 
            transition: transform 0.8s var(--apple-spring);
            will-change: transform; display: flex; flex-direction: column; 
            align-items: flex-start;
        }

        .lyric-line {
            padding: 3vh 0; width: 100%;
            transition: all 0.8s var(--apple-spring);
            transform-origin: left center; transform: scale(0.85);
            /* 🌟 关键修改：将基础透明度拉满到 1，亮度由颜色本身控制 */
            opacity: 1; 
            filter: blur(2px); /* 靠虚化来区分非活跃行，而不是靠变暗 */
            display: flex; flex-direction: column; gap: 1vh;
        }

        .lyric-line.active { 
            transform: scale(1.1); 
            filter: blur(0) brightness(1.2); /* 🌟 增加 20% 的额外亮度 */
        }

        .lyric-line.active .main-lyric {
            color: rgba(255, 255, 255, 1); /* 100% 纯白 */
        }

        .main-lyric { 
            font-size: 5vh; font-weight: 900; 
            /* 🌟 非活跃行给 0.6 的白色，配合 blur 产生精致的远景感 */
            color: rgba(255, 255, 255, 0.6); 
            line-height: 1.2; text-shadow: 0 2px 8px rgba(0,0,0,0.7); 
        }
        .sub-lyric { font-size: 2.5vh; font-weight: 700; color: var(--theme-text-sub); opacity: 0.7; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }

        .char { position: relative; display: inline-block; color: var(--theme-text-sub); white-space: pre; }
        
        .lyric-line.active .char::after {
            content: attr(data-text); position: absolute; left: 0; top: 0;
            color: var(--theme-text-main);
            clip-path: inset(-0.3em calc(100% - var(--fill, 0%)) -0.3em -0.1em);
            transition: clip-path 0.05s linear;
        }

        .lyric-line.active:not(.is-karaoke) .main-lyric { color: var(--theme-text-main); }
        .lyric-line.active .sub-lyric { color: var(--theme-text-main); opacity: 1; }

        .standby-watermark {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 8vh; font-weight: 800; text-align: center; line-height: 1.3; letter-spacing: -0.02em;
            mix-blend-mode: soft-light; color: rgba(255,255,255,0.4);
            text-shadow: -1px -1px 2px rgba(255,255,255,0.2), 2px 2px 5px rgba(0,0,0,0.9);
            transition: opacity 1.5s var(--apple-spring); pointer-events: none; z-index: 4; opacity: 0; white-space: pre-wrap; 
        }

        body.is-paused .stage-wrapper { opacity: 0; filter: blur(10px); pointer-events: none; }
        body.is-paused .standby-watermark { opacity: 1; }
    </style>
</head>
<body>
    <div class="stage-wrapper">
        <div class="main-stage">
            <div class="left-panel">
                <div class="cover-box"><img id="cover" class="cover-img" src="" crossorigin="anonymous"></div>
                <div class="title" id="title">-</div>
                <div class="artist" id="artist">-</div>
                <div class="progress-group">
                    <div class="time-row"><span id="time-curr">0:00</span><span id="time-total">-0:00</span></div>
                    <div class="track-bar"><div class="fill-bar" id="fill"></div></div>
                </div>
            </div>
            <div class="right-panel">
                <div id="lyric-track"></div>
            </div>
        </div>
    </div>

    <div class="standby-watermark">Now Playing - Stage&#10;Design by F1y / Car</div>

    <script>
        const BASE_URL = 'http://localhost:9863';
        let lyricList = [], currentTrackKey = "", currentIndex = -1, lastTrackSwitchTime = 0;

        function formatTime(ms) {
            let s = Math.floor(ms / 1000); return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
        }

        function parseLyrics(raw, rawTlyric) {
            lyricList = []; if (!raw) return;
            let content = raw;
            try {
                const decoded = JSON.parse(raw.startsWith('"') ? JSON.parse(raw) : raw);
                content = decoded.content || decoded.karaokeLyric || decoded.lrc || raw;
            } catch (e) {
                if (content.includes('LyricContent="')) {
                    const match = content.match(/LyricContent="([^"]+)"/);
                    if (match) content = match[1];
                }
            }
            content = content.replace(/\\n/g, '\n').replace(/&quot;/g, '"');
            const lines = content.split('\n');
            const qLineRegex = /^\[(\d+),(\d+)\](.*)/;

            lines.forEach(l => {
                const lineStr = l.trim();
                if (!lineStr || lineStr.startsWith('{')) return;
                const mQrc = qLineRegex.exec(lineStr);
                if (mQrc) {
                    const lineStart = parseInt(mQrc[1]), contentStr = mQrc[3].trimStart();
                    const parts = contentStr.split(/\((\d+),\s*(\d+)[^)]*\)/);
                    const words = [], isTagFirst = (parts[0] === "");
                    for (let j = 1; j < parts.length; j += 3) {
                        const wStart = parseInt(parts[j]), wDur = parseInt(parts[j+1]);
                        const txt = isTagFirst ? parts[j+2] : parts[j-1];
                        const absStart = wStart >= lineStart ? wStart : lineStart + wStart;
                        if (txt !== undefined && txt !== "") words.push({ start: absStart, dur: wDur, text: txt });
                    }
                    if (words.length > 0) lyricList.push({ timeMs: lineStart, words, type: 'karaoke' });
                } else {
                    const mLrc = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/.exec(lineStr);
                    if (mLrc) {
                        const ms = parseInt(mLrc[1])*60000 + parseInt(mLrc[2])*1000 + (mLrc[3].length===2?parseInt(mLrc[3])*10:parseInt(mLrc[3]));
                        const txt = mLrc[4].trim();
                        if (txt && txt !== "//") lyricList.push({ timeMs: ms, text: txt, type: 'lrc' });
                    }
                }
            });

            if (rawTlyric && lyricList.length > 0) {
                const tLines = rawTlyric.replace(/\\n/g, '\n').replace(/&quot;/g, '"').split('\n');
                const tMap = [];
                tLines.forEach(tl => {
                    const m = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/.exec(tl.trim());
                    if (m) {
                        const ms = parseInt(m[1])*60000 + parseInt(m[2])*1000 + (m[3].length===2?parseInt(m[3])*10:parseInt(m[3]));
                        if (m[4].trim()) tMap.push({ ms, txt: m[4].trim() });
                    }
                });
                lyricList.forEach(line => {
                    let best = tMap.reduce((prev, curr) => Math.abs(curr.ms - line.timeMs) < Math.abs(prev.ms - line.timeMs) ? curr : prev, {ms: -999999, txt: ""});
                    if (Math.abs(best.ms - line.timeMs) < 1500) line.tlyric = best.txt;
                });
            }

            const track = document.getElementById('lyric-track');
            if (lyricList.length === 0) {
                track.innerHTML = '<div class="lyric-line active"><div class="main-lyric">暂无歌词数据</div></div>';
            } else {
                track.innerHTML = lyricList.map((l, i) => {
                    const inner = l.type === 'karaoke' ? l.words.map(w => `<span class="char" data-text="${w.text.replace(/"/g, '&quot;')}" data-start="${w.start}" data-dur="${w.dur}">${w.text}</span>`).join('') : l.text;
                    const tHtml = l.tlyric ? `<div class="sub-lyric">${l.tlyric}</div>` : '';
                    return `<div class="lyric-line ${l.type==='karaoke'?'is-karaoke':''}" id="line-${i}"><div class="main-lyric">${inner}</div>${tHtml}</div>`;
                }).join('');
            }
        }

        async function update() {
            try {
                const q = await (await fetch(`${BASE_URL}/api/query`)).json();
                const player = q.player || q;
                const track = q.track || q;

                if (!player.hasSong || player.isPaused) { document.body.classList.add('is-paused'); }
                else { document.body.classList.remove('is-paused'); }

                const trackKey = (track.title || '') + (track.author || '');
                if (trackKey !== currentTrackKey) {
                    currentTrackKey = trackKey; 
                    lastTrackSwitchTime = Date.now();
                    
                    document.getElementById('title').innerText = track.title || "-";
                    document.getElementById('artist').innerText = track.author || "-";

                    const coverUrl = track.cover || track.picUrl || "";
                    if (coverUrl) {
                        document.getElementById('cover').src = coverUrl;
                    }

                    const lrcRes = await (await fetch(`${BASE_URL}/api/lyric`)).json();
                    parseLyrics(lrcRes.karaokeLyric || lrcRes.lrc || "", lrcRes.translatedLyric || "");
                    currentIndex = -1;
                }

                const prog = await (await fetch(`${BASE_URL}/api/query/progress`)).json();
                let currMs = prog.progress !== undefined ? prog.progress : prog;
                if (Date.now() - lastTrackSwitchTime < 2000 && currMs > 5000) currMs = 0;

                const durMs = (track.duration||0)<100000?track.duration*1000:track.duration;
                document.getElementById('time-curr').innerText = formatTime(currMs);
                const remainMs = durMs - currMs;
                document.getElementById('time-total').innerText = remainMs > 0 ? `-${formatTime(remainMs)}` : "0:00";
                document.getElementById('fill').style.width = `${Math.min((currMs/Math.max(durMs, 1))*100, 100)}%`;

                let newIndex = -1;
                for (let i = lyricList.length - 1; i >= 0; i--) {
                    if (currMs >= lyricList[i].timeMs) { newIndex = i; break; }
                }

                if (newIndex !== -1 && lyricList[newIndex].type === 'karaoke') {
                    const lineEl = document.getElementById(`line-${newIndex}`);
                    if (lineEl) {
                        lineEl.querySelectorAll('.char').forEach(c => {
                            const start = Number(c.getAttribute('data-start')), dur = Number(c.getAttribute('data-dur')) || 1;
                            let pct = currMs >= start + dur ? 100 : (currMs >= start ? ((currMs - start) / dur) * 100 : 0);
                            c.style.setProperty('--fill', `${pct}%`);
                        });
                    }
                }

                if (newIndex !== currentIndex && newIndex !== -1) {
                    const trackEl = document.getElementById('lyric-track');
                    const lines = document.getElementsByClassName('lyric-line');
                    if (currentIndex !== -1 && lines[currentIndex]) lines[currentIndex].classList.remove('active');
                    currentIndex = newIndex;
                    const target = lines[currentIndex];
                    if (target) {
                        target.classList.add('active');
                        trackEl.style.transform = `translateY(-${target.offsetTop + (target.offsetHeight / 2)}px)`;
                    }
                }
            } catch (e) {}
        }
        setInterval(update, 50);
    </script>
</body>
</html>
